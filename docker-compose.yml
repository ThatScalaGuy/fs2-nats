version: "3.8"

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222", "--debug"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Separate broker for the NKey auth integration test. Kept on its own ports so
  # the plaintext suite against `nats` above is unaffected. Started on demand:
  #   docker compose up -d nats-nkey
  nats-nkey:
    image: nats:latest
    ports:
      - "4223:4222"
      - "8223:8222"
    volumes:
      - ./integration/src/test/resources/nats-nkey.conf:/etc/nats/nats-nkey.conf:ro
    command: ["-c", "/etc/nats/nats-nkey.conf", "--debug"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Auth integration brokers, each isolated on its own ports so the suites do
  # not interfere. Started on demand, e.g.:
  #   docker compose up -d nats-token nats-userpass nats-creds nats-tls nats-mtls

  # Token auth (TokenAuthIntegrationSpec).
  nats-token:
    image: nats:latest
    ports:
      - "4224:4222"
      - "8224:8222"
    volumes:
      - ./integration/src/test/resources/nats-token.conf:/etc/nats/nats-token.conf:ro
    command: ["-c", "/etc/nats/nats-token.conf", "--debug"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Username/password auth (UserPasswordAuthIntegrationSpec).
  nats-userpass:
    image: nats:latest
    ports:
      - "4225:4222"
      - "8225:8222"
    volumes:
      - ./integration/src/test/resources/nats-userpass.conf:/etc/nats/nats-userpass.conf:ro
    command: ["-c", "/etc/nats/nats-userpass.conf", "--debug"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Decentralized JWT / operator mode with a MEMORY resolver
  # (CredsAuthIntegrationSpec). Account/user JWTs are preloaded in the conf.
  nats-creds:
    image: nats:latest
    ports:
      - "4226:4222"
      - "8226:8222"
    volumes:
      - ./integration/src/test/resources/nats-creds.conf:/etc/nats/nats-creds.conf:ro
    command: ["-c", "/etc/nats/nats-creds.conf", "--debug"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-way TLS (TlsIntegrationSpec). Monitoring (8222) stays plaintext so the
  # healthcheck is unaffected by the client-port TLS.
  nats-tls:
    image: nats:latest
    ports:
      - "4227:4222"
      - "8227:8222"
    volumes:
      - ./integration/src/test/resources/nats-tls.conf:/etc/nats/nats-tls.conf:ro
      - ./integration/src/test/resources/tls:/etc/nats/certs:ro
    command: ["-c", "/etc/nats/nats-tls.conf", "--debug"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Mutual TLS (TlsIntegrationSpec). Requires a client cert signed by the CA.
  nats-mtls:
    image: nats:latest
    ports:
      - "4228:4222"
      - "8228:8222"
    volumes:
      - ./integration/src/test/resources/nats-mtls.conf:/etc/nats/nats-mtls.conf:ro
      - ./integration/src/test/resources/tls:/etc/nats/certs:ro
    command: ["-c", "/etc/nats/nats-mtls.conf", "--debug"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Three-node cluster for ClusterFailoverIntegrationSpec. The nodes gossip each
  # other's client addresses into INFO connect_urls. `client_advertise` points at
  # the host-reachable mapped ports so a client running on the host can fail over
  # to a *discovered* peer. Started on demand:
  #   docker compose up -d nats-cluster-1 nats-cluster-2 nats-cluster-3
  nats-cluster-1:
    image: nats:latest
    container_name: nats-cluster-1
    ports:
      - "4231:4222"
      - "8231:8222"
    command:
      - "--server_name=n1"
      - "--cluster_name=c1"
      - "--cluster=nats://0.0.0.0:6222"
      - "--routes=nats://nats-cluster-1:6222,nats://nats-cluster-2:6222,nats://nats-cluster-3:6222"
      - "--client_advertise=localhost:4231"
      - "-m"
      - "8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats-cluster-2:
    image: nats:latest
    container_name: nats-cluster-2
    ports:
      - "4232:4222"
      - "8232:8222"
    command:
      - "--server_name=n2"
      - "--cluster_name=c1"
      - "--cluster=nats://0.0.0.0:6222"
      - "--routes=nats://nats-cluster-1:6222,nats://nats-cluster-2:6222,nats://nats-cluster-3:6222"
      - "--client_advertise=localhost:4232"
      - "-m"
      - "8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats-cluster-3:
    image: nats:latest
    container_name: nats-cluster-3
    ports:
      - "4233:4222"
      - "8233:8222"
    command:
      - "--server_name=n3"
      - "--cluster_name=c1"
      - "--cluster=nats://0.0.0.0:6222"
      - "--routes=nats://nats-cluster-1:6222,nats://nats-cluster-2:6222,nats://nats-cluster-3:6222"
      - "--client_advertise=localhost:4233"
      - "-m"
      - "8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
