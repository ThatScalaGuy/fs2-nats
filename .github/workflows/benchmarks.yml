# Standalone benchmark workflow. Not managed by sbt-typelevel (which only owns
# ci.yml / clean.yml), so it is safe from `githubWorkflowGenerate`.
name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      messages:
        description: "Number of messages for ThroughputBench"
        required: false
        default: "500000"
      payloadBytes:
        description: "Payload size in bytes"
        required: false
        default: "16"
  pull_request:
    paths:
      - "benchmarks/**"
      - "src/main/**"
      - "build.sbt"
      - "project/plugins.sbt"

permissions:
  contents: read

jobs:
  # Cheap guard on every relevant PR: make sure the harness still compiles
  # (including the generated JMH wrappers). No server, no measurements.
  compile:
    name: Compile benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - run: sbt -batch "benchmarks/Jmh/compile"

  # Full run, manual only (CI runners are noisy for absolute perf numbers, so
  # treat these as trend/sanity signals, not precise measurements).
  run:
    name: Run benchmarks
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:latest
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1

      - name: Wait for NATS
        run: |
          for i in $(seq 1 30); do
            (echo > /dev/tcp/localhost/4222) >/dev/null 2>&1 && { echo "NATS is up"; exit 0; }
            sleep 1
          done
          echo "NATS did not become ready" >&2
          exit 1

      - name: Throughput + latency
        run: |
          sbt -batch "benchmarks/runMain fs2.nats.benchmarks.ThroughputBench ${{ github.event.inputs.messages }} ${{ github.event.inputs.payloadBytes }}"

      - name: JMH (serialization + parser)
        run: |
          sbt -batch "benchmarks/Jmh/run -i 3 -wi 3 -f 1 -rf json -rff jmh-result.json .*Benchmark.*"

      - name: Upload JMH results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results
          path: jmh-result.json
          if-no-files-found: ignore
