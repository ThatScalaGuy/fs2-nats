# Scala Steward repository configuration.
# https://github.com/scala-steward-org/scala-steward/blob/main/docs/repo-specific-configuration.md
#
# Bundles dependency updates into a handful of meaningful PRs instead of one PR
# per dependency. Groups are evaluated top-to-bottom and the FIRST matching
# group wins, so the version-based buckets only catch what the ecosystem groups
# above them don't. Inside a grouping filter the keys are `group` / `artifact`
# / `version` (note: not `groupId` / `artifactId`).
pullRequests.grouping = [
  # The Typelevel/FS2 stack is version-coupled (fs2 tracks cats-effect, etc.),
  # so keep these moving together in one PR regardless of bump size.
  { name = "typelevel", title = "Typelevel & FS2 updates", filter = [
    { group = "org.typelevel" },
    { group = "co.fs2" }
  ]},

  # Test toolchain (munit, munit-scalacheck, scalacheck).
  { name = "test-libraries", title = "Test library updates", filter = [
    { group = "org.scalameta" },
    { group = "org.scalacheck" }
  ]},

  # Everything else, split by semver bump so low-risk patches can be merged
  # quickly and minor/major bumps get a closer look.
  { name = "patches", title = "Patch updates", filter = [
    { version = "patch" }
  ]},
  { name = "minor-and-major", title = "Minor & major updates", filter = [
    { version = "minor" },
    { version = "major" }
  ]},

  # Safety net so nothing falls back to one-PR-per-update.
  { name = "all", title = "Other dependency updates", filter = [
    { group = "*" }
  ]}
]
