listen: 0.0.0.0:4222
http: 0.0.0.0:8222

# Mutual TLS. verify:true makes the server demand and verify a client
# certificate signed by the test CA. TlsIntegrationSpec connects with a
# key+trust TLSContext (succeeds) and a trust-only one (rejected).
tls {
  cert_file: "/etc/nats/certs/server.crt"
  key_file: "/etc/nats/certs/server.key"
  ca_file: "/etc/nats/certs/ca.crt"
  verify: true
}
