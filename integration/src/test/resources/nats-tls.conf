listen: 0.0.0.0:4222
http: 0.0.0.0:8222

# One-way (server-authenticated) TLS. The client must trust the test CA; no
# client certificate is required. TlsIntegrationSpec connects with a trust-only
# TLSContext.
tls {
  cert_file: "/etc/nats/certs/server.crt"
  key_file: "/etc/nats/certs/server.key"
}
